<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Admin Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/adminstyle.css') }}">
</head>

<body>

    <header class="header">
        <div class="logo">Helpdesk Admin Portal</div>
        <button class="logout-btn">Logout</button>
    </header>

    <div class="layout">

        <!-- Add Q&A -->
        <section class="card">
            <h2>Add Question & Answer</h2>

            <label>Question</label>
            <textarea id="question" placeholder="Enter Question"></textarea>

            <label>Answer</label>
            <textarea id="answer" placeholder="Enter Answer"></textarea>

            <button class="primary-btn" onclick="addQA()">Add to Database</button>
        </section>

        <!-- Q&A Database -->
        <section class="card">
            <h2>Q & A Database</h2>
            <div class="table-container">
                <table id="qaTable">
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Answer</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Feedback Database -->
        <section class="card">
            <h2>Feedback Database</h2>
            <div class="table-container">
                <table id="feedbackTable">
                    <thead>
                        <tr>
                            <th>Feedback Message</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginstyle.css') }}">
</body>

</html>
